name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libswe-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Download Swiss Ephemeris data
        run: |
          mkdir -p /tmp/ephe
          cd /tmp/ephe
          curl -sLO https://github.com/aloistr/swisseph/raw/master/ephe/sepl_18.se1
          curl -sLO https://github.com/aloistr/swisseph/raw/master/ephe/semo_18.se1
          curl -sLO https://github.com/aloistr/swisseph/raw/master/ephe/seas_18.se1
          curl -sLO https://github.com/aloistr/swisseph/raw/master/ephe/seplm06.se1
        env:
          SE_EPHE_PATH: /tmp/ephe

      - name: Verify ephemeris files are binary (not HTML error pages)
        run: |
          for f in /tmp/ephe/*.se1; do
            if head -c 5 "$f" | grep -q '<'; then
              echo "ERROR: $f contains HTML, not ephemeris data"
              exit 1
            fi
          done
          echo "All ephemeris files verified as binary"

      - name: Run tests
        run: pytest -v --tb=short
        env:
          SE_EPHE_PATH: /tmp/ephe

      - name: Check OpenAPI spec drift
        run: python scripts/export_openapi.py --check
        env:
          SE_EPHE_PATH: /tmp/ephe

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy

      - name: Run mypy
        run: mypy bazi_engine --ignore-missing-imports

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check bazi_engine/ --output-format=github

  codegen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate TypeScript client
        uses: docker://openapitools/openapi-generator-cli
        with:
          args: generate -i spec/openapi/openapi.json -g typescript-fetch -o /github/workspace/generated/ts-client

      - name: Fix generated file ownership
        run: sudo chown -R $(id -u):$(id -g) generated/ts-client

      - name: Compile generated client
        run: |
          cd generated/ts-client
          [ -f package.json ] || echo '{"private":true}' > package.json
          npm install typescript --save-dev
          npx tsc --noEmit --esModuleInterop --target es2020 --module commonjs --moduleResolution node index.ts
